<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>管理者画面</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', 'Meiryo', Arial, sans-serif; }
    body { margin: 0; background: #f3f3f3; color: #222; }
    .screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .panel {
      width: min(560px, 96vw);
      background: #fff;
      border: 1px solid #c9c9c9;
      padding: 28px;
    }
    .title {
      margin: 0 0 16px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
    }
    .description {
      margin: 0 0 20px;
      text-align: center;
      font-size: 16px;
    }
    .setting-card {
      border: 1px solid #d9d9d9;
      background: #fafafa;
      padding: 16px;
    }
    .setting-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .radio-group {
      display: grid;
      gap: 10px;
    }
    .radio-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
    }
    .hint {
      margin: 14px 0 0;
      font-size: 14px;
      color: #4b4b4b;
    }
    .button-row {
      margin-top: 32px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn {
      padding: 8px 20px;
      background-color: #eeeeee;
      border: 1px solid #36393d;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
    }
    .btn:hover { background-color: #d9d9d9; }
  </style>
</head>
<body>
  <main class="screen">
    <section class="panel" aria-label="管理者画面">
      <h1 class="title">＜管理者画面＞</h1>
      <p class="description">DB接続先を選択してください。</p>
      <section class="setting-card" aria-label="DB接続設定">
        <h2 class="setting-title">DB接続</h2>
        <div class="radio-group">
          <label class="radio-row">
            <input type="radio" name="dbConnection" value="server" id="dbServer">
            <span>サーバー</span>
          </label>
          <label class="radio-row" id="localOptionRow">
            <input type="radio" name="dbConnection" value="local" id="dbLocal">
            <span>ローカル</span>
          </label>
        </div>
        <p class="hint" id="currentValue"></p>
      </section>
      <div class="button-row">
        <button class="btn" id="save">保存</button>
        <button class="btn" id="close">終了</button>
      </div>
    </section>
  </main>
  <script>
    const STORAGE_KEY = 'db_connection_mode';
    const LOCAL_API_BASE = 'http://localhost:3000';
    const serverRadio = document.getElementById('dbServer');
    const localRadio = document.getElementById('dbLocal');
    const localOptionRow = document.getElementById('localOptionRow');
    const currentValue = document.getElementById('currentValue');
    let localConnectionAvailable = false;

    function getStoredMode() {
      const mode = localStorage.getItem(STORAGE_KEY);
      return mode === 'local' ? 'local' : 'server';
    }

    function renderCurrentValue() {
      const mode = getStoredMode();
      currentValue.textContent = `現在の設定: ${mode === 'server' ? 'サーバー' : 'ローカル'}`;
      serverRadio.checked = mode === 'server';
      localRadio.checked = mode === 'local';
    }

    async function testLocalConnection() {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 1500);

      try {
        const [productsResponse, ordersResponse] = await Promise.all([
          fetch(`${LOCAL_API_BASE}/products`, {
            method: 'GET',
            signal: controller.signal
          }),
          fetch(`${LOCAL_API_BASE}/orders`, {
            method: 'GET',
            signal: controller.signal
          })
        ]);
        clearTimeout(timeoutId);
        return productsResponse.ok && ordersResponse.ok;
      } catch (error) {
        clearTimeout(timeoutId);
        return false;
      }
    }

    function applyLocalAvailability(isAvailable) {
      localConnectionAvailable = isAvailable;
      localRadio.disabled = !isAvailable;
      localOptionRow.style.opacity = isAvailable ? '1' : '0.5';

      const currentMode = getStoredMode();
      if (!isAvailable && currentMode === 'local') {
        localStorage.setItem(STORAGE_KEY, 'server');
      }

      renderCurrentValue();

      if (isAvailable) {
        currentValue.textContent += ' / ローカル接続: OK';
      } else {
        currentValue.textContent += ' / ローカル接続: NG (/products または /orders が未接続)';
      }
    }

    document.getElementById('save').addEventListener('click', () => {
      if (localRadio.checked && !localConnectionAvailable) {
        alert('ローカルへ接続できないため、サーバーを選択してください。');
        return;
      }

      const selected = localRadio.checked ? 'local' : 'server';
      localStorage.setItem(STORAGE_KEY, selected);
      renderCurrentValue();
      alert(`DB接続設定を保存しました: ${selected === 'server' ? 'サーバー' : 'ローカル'}`);
    });

    document.getElementById('close').addEventListener('click', () => {
      window.location.href = '../index.html';
    });

    (async () => {
      renderCurrentValue();
      const available = await testLocalConnection();
      applyLocalAvailability(available);
    })();
  </script>
</body>
</html>
