<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>商品マスタ - モック画面</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="title">＜商品マスタ画面＞</div>
    
    <!-- 上部：商品一覧テーブル -->
    <table class="product-table">
      <thead>
        <tr>
          <th>コード</th>
          <th>名称</th>
          <th>金額</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="code">10</td>
          <td class="name">鉛筆</td>
          <td class="price">110</td>
        </tr>
        <tr>
          <td class="code">20</td>
          <td class="name">ボールペン</td>
          <td class="price">120</td>
        </tr>
        <tr>
          <td class="code">21</td>
          <td class="name">消しゴム</td>
          <td class="price">80</td>
        </tr>
        <tr>
          <td class="code">30</td>
          <td class="name">ハサミ</td>
          <td class="price">200</td>
        </tr>
      </tbody>
    </table>

    <!-- 下部：入力フォーム（テーブル形式） -->
    <table class="input-table">
      <thead>
        <tr>
          <th>コード</th>
          <th>名称</th>
          <th>金額</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input type="text" id="code" maxlength="10" inputmode="numeric" pattern="[0-9]*"></td>
          <td><input type="text" id="name" maxlength="50"></td>
          <td><input type="number" id="price" min="0"></td>
        </tr>
      </tbody>
    </table>

    <!-- ボタングループ -->
    <!-- ボタングループ：商品の作成、更新、削除、終了の操作ボタン -->
    <div class="button-group">
      <button class="btn" id="create">作成</button>
      <button class="btn" id="update">更新</button>
      <button class="btn" id="delete">削除</button>
      <button class="btn" id="close">終了</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
